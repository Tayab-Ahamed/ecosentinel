name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/
      - run: ruff format backend/ --check

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio
      - run: pip install -r backend/requirements-base.txt -r backend/requirements-dev.txt
      - working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_ecosentinel_ci.db
      - working-directory: backend
        run: pytest -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_ecosentinel_ci.db
          ECOSENTINEL_SKIP_WHISPER_INIT: "1"
          GEMINI_API_KEY: ""

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run build
